version: 2

project_name: port-ls

before:
  hooks:
    - go mod tidy

builds:
  - id: port-ls
    main: ./cmd/port-ls
    binary: port-ls
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/isksss/port-ls/internal/version.Version={{.Version}}
      - -X github.com/isksss/port-ls/internal/version.Commit={{.Commit}}
      - -X github.com/isksss/port-ls/internal/version.Date={{.Date}}

archives:
  - id: default
    ids:
      - port-ls
    name_template: "port-ls_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "port-ls_checksums.txt"

changelog:
  use: github
  sort: asc

release:
  github:
    owner: isksss
    name: port-ls
